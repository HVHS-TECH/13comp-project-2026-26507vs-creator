<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
</head>
<body>
    <div class="signUpContainer">
    <h1 class="signUpPageTitle">Create Your Account</h1>

    <form>
        <p>First name</p>
        <input type="text" placeholder="E.G John" required>
        <p>Last name</p>
        <input type="text" placeholder="E.G Doe" required>
        <p>Email</p>
        <input type="email" placeholder="E.G john.doe@gmail.com" required>
        <p>Age</p>
        <input type="number" placeholder="E.G 45" required>
        <p>Gender</p>
        <select>
            <option>Select One</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
    </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
