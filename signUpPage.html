<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
</head>

<body class="blueBorder">
    <div class="centre">
        <div class="signUpContainer">
            <h1 class="signUpPageTitle">Create Your Account</h1>

            <form>
                <div class="inputItem">
                    <p>Full name</p>
                    <input type="text" id="name" pattern="[A-Za-z ]+"  placeholder="E.G John Doe" title="Please enter your full name" required>
                </div>

                <div class="inputItem">
                    <p>Username</p>
                    <input type="text" id="username" pattern="[A-Za-z0-9]+" placeholder="E.G JDog" title="Please enter a valid username" required>
                </div>

                <div class="inputItem">
                    <p>Email</p>
                    <input type="email" id="email" placeholder="E.G john.doe@gmail.com" title="Please enter a valid email address" required>
                </div>

                <div class="inputItem">
                    <p>Age</p>
                    <input type="number" id="age" min="0" max="100" placeholder="E.G 35" title="Please enter a valid age" required>
                </div>

                <div class="inputItem">
                    <p>Gender</p>
                    <select id="gender">
                        <option>Select One</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="inputItem">
                    <p>Region</p>
                    <input type="text" id="region" pattern="[A-Za-z ]+" placeholder="E.G Auckland" title="Please enter a valid region" required>
                </div>
                <input id="submit" type="submit" onclick="writeRec()" class="submitButton">
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script type="module" src="signUpPage.js"></script>
</body>

</html>
