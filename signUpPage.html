<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
</head>

<body class="blueBorder">
    <div class="centre">
        <div class="signUpContainer">
            <h1 class="signUpPageTitle">Create Your Account</h1>

            <form>
                <div class="inputItem">
                    <p>Full name</p>
                    <input type="text" id="name" placeholder="E.G John Doe" required>
                </div>

                <div class="inputItem">
                    <p>Username</p>
                    <input type="text" id="username" placeholder="E.G JDog" required>
                </div>

                <div class="inputItem">
                    <p>Email</p>
                    <input type="email" id="email" placeholder="E.G john.doe@gmail.com" required>
                </div>

                <div class="inputItem">
                    <p>Age</p>
                    <input type="number" id="age" placeholder="E.G 35" required>
                </div>

                <div class="inputItem">
                    <p>Gender</p>
                    <select id="gender">
                        <option>Select One</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="inputItem">
                    <p>Region</p>
                    <input type="text" id="region" placeholder="E.G Auckland" required>
                </div>

            </form>

            <button onclick="writeRec()" class="submitButton">Submit</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script type="module" src="signUpPage.js"></script>
</body>

</html>
